        textarea { width: 90%; max-width: 1000px; margin: 10px auto; display: block; height: 120px; background: #0f3460; color: #e0e0e0; border: 1px solid #7b68ee; border-radius: 8px; padding: 10px; font-family: monospace; }
        button { display: block; margin: 10px auto; padding: 10px 30px; background: #7b68ee; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
        button:hover { background: #6a5acd; }
        .note { text-align: center; color: #888; font-size: 14px; }

    <button onclick="renderCharts()">📊 Render Charts</button>

    <h2>Latency vs KV_seqlen</h2>
    <div class="chart-container"><canvas id="latencyChart"></canvas></div>

    <h2>Effective Bandwidth (GB/s) vs KV_seqlen</h2>
    <div class="chart-container"><canvas id="bwChart"></canvas></div>

    <h2>Speedup over Baseline</h2>
    <div class="chart-container"><canvas id="speedupChart"></canvas></div>

<script>
const COLORS = {
    'baseline':         '#ff6384',
    'fd_naive':         '#ff9f40',
    'fd_v1_coalesced':  '#ffcd56',
    'fd_v2_largechunk': '#4bc0c0',
    'fd_v3_multiwarp':  '#36a2eb',
    'fd_v4_final':      '#9966ff',
    'fd_v5_fused':      '#00ffcc',
    'fd_v5_split':      '#ff00ff',
    'fa_final':         '#c9cbcf',
};

let charts = {};

function parseCSV(text) {
    const lines = text.trim().split('\n');
    const header = lines[0].split(',');
    return lines.slice(1).filter(l => l.trim()).map(line => {
        const vals = line.split(',');
        return {
            kernel: vals[0].trim(),
            KV: parseInt(vals[1]),
            d: parseInt(vals[2]),
            time_ms: parseFloat(vals[3]),
            bw: parseFloat(vals[4]),
        };
    });
}

function renderCharts() {
    const data = parseCSV(document.getElementById('csvInput').value);
    const kernels = [...new Set(data.map(d => d.kernel))];
    const kvs = [...new Set(data.map(d => d.KV))].sort((a,b) => a-b);

    // Get baseline times for speedup
    const baselineTimes = {};
    data.filter(d => d.kernel === 'baseline').forEach(d => baselineTimes[d.KV] = d.time_ms);

    // Latency chart
    if (charts.latency) charts.latency.destroy();
    charts.latency = new Chart(document.getElementById('latencyChart'), {
        type: 'line',
        data: {
            labels: kvs.map(String),
            datasets: kernels.map(k => ({
                label: k,
                data: kvs.map(kv => {
                    const row = data.find(d => d.kernel === k && d.KV === kv);
                    return row ? row.time_ms : null;
                }),
                borderColor: COLORS[k] || '#888',
                backgroundColor: (COLORS[k] || '#888') + '33',
                borderWidth: 2, tension: 0.3, pointRadius: 4,
            }))
        },
        options: {
            responsive: true,
            plugins: { title: { display: true, text: 'Latency (ms) — lower is better', color: '#e0e0e0', font: {size:16} },
                        legend: { labels: { color: '#e0e0e0' } } },
            scales: {
                x: { title: { display: true, text: 'KV_seqlen', color: '#aaa' }, ticks: { color: '#aaa' }, grid: { color: '#333' } },
                y: { type: 'logarithmic', title: { display: true, text: 'Time (ms)', color: '#aaa' }, ticks: { color: '#aaa' }, grid: { color: '#333' } }
            }
        }
    });

    // Bandwidth chart
    if (charts.bw) charts.bw.destroy();
    charts.bw = new Chart(document.getElementById('bwChart'), {
        type: 'bar',
        data: {
            labels: kvs.map(String),
            datasets: kernels.map(k => ({
                label: k,
                data: kvs.map(kv => {
                    const row = data.find(d => d.kernel === k && d.KV === kv);
                    return row ? row.bw : null;
                }),
                backgroundColor: COLORS[k] || '#888',
                borderColor: (COLORS[k] || '#888'),
                borderWidth: 1,
            }))
        },
        options: {
            responsive: true,
            plugins: { title: { display: true, text: 'Effective Bandwidth (GB/s) — higher is better', color: '#e0e0e0', font: {size:16} },
                        legend: { labels: { color: '#e0e0e0' } } },
            scales: {
                x: { title: { display: true, text: 'KV_seqlen', color: '#aaa' }, ticks: { color: '#aaa' }, grid: { color: '#333' } },
                y: { title: { display: true, text: 'GB/s', color: '#aaa' }, ticks: { color: '#aaa' }, grid: { color: '#333' } }
            }
        }
    });

    // Speedup chart
    if (charts.speedup) charts.speedup.destroy();
    charts.speedup = new Chart(document.getElementById('speedupChart'), {
        type: 'line',
        data: {
            labels: kvs.map(String),
            datasets: kernels.filter(k => k !== 'baseline').map(k => ({
                label: k,
                data: kvs.map(kv => {
                    const row = data.find(d => d.kernel === k && d.KV === kv);
                    const bt = baselineTimes[kv];
                    return (row && bt) ? (bt / row.time_ms) : null;
                }),
                borderColor: COLORS[k] || '#888',
                borderWidth: 2, tension: 0.3, pointRadius: 4,
            }))
        },
        options: {
            responsive: true,
            plugins: { title: { display: true, text: 'Speedup over Baseline — higher is better', color: '#e0e0e0', font: {size:16} },
                        legend: { labels: { color: '#e0e0e0' } } },
            scales: {
                x: { title: { display: true, text: 'KV_seqlen', color: '#aaa' }, ticks: { color: '#aaa' }, grid: { color: '#333' } },
                y: { title: { display: true, text: 'Speedup×', color: '#aaa' }, ticks: { color: '#aaa' }, grid: { color: '#333' } }
            }
        }
    });
}

// Auto-render with placeholder data
window.onload = renderCharts;
</script>
</body>
